<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
    rel="stylesheet">  


    <title>12기 지원자 김민철</title>

    <style>
      * {font-family: "Roboto", sans-serif;}
      .container { max-width: 920px; }
      .hero { background: #e9ecef; border-radius: 12px; padding: 24px; margin-top: 18px;}
      .memo-form { background: #e9ecef; border-radius: 12px; padding: 18px; margin-top: 16px; }
      .card-actions { display: flex; gap: 10px; align-items: center; }
      .like-area { cursor: pointer; user-select: none; }
      
    </style>
  </head>

  <body>
    <div class="container"> 
      <div class="hero">
        <h1 class="mb-0 px-3"> 
          나홀로메모장 <span class="badge bg-secondary">ver2.0</span>
        </h1>
        <div class="memo-form">
        <form id="memo-form">
          <div class="mb-3">
            <input
              id="memo-title"
              class="form-control"
              style="width:400px"
              placeholder="제목을 입력하세요"
            />
          </div>

          <div class="mb-3">
            <textarea
              id="memo-content"
              class="form-control"
              rows="3"
              style="width:400px"
              placeholder="내용을 입력하세요"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary">저장하기</button>
        </form>
      </div>
      </div>
  
      <div id="card-list" class="row row-cols-1 row-cols-md-3 g-4 mt-2"></div>
    </div>

    <!-- 이 부분은 절대 지우지 마세요. -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 이 부분은 절대 지우지 마세요. -->

    <script>
      $(document).ready(function () {

        loadMemos();

        $("#memo-form").on("submit", function (e) {
          e.preventDefault(); // submit의 기본동작인 새로고침을 막기 위해 사용
          createMemo(); 
        });
      });

      function loadMemos() {  // 메모 목록을 받아와 보여주는 함수
        $.ajax({
          type: "GET",
          url: "/api/memos",
          success: function (response) {
            if (response.result !== "success") return;

            $("#card-list").empty();

            const memos = response.memos;

            for (let i = 0; i < memos.length; i++) {
              appendMemoCard(memos[i]);
            }
          },
        });
      }

      function createMemo() { // 새 메모 저장 함수
        const title = $("#memo-title").val().trim();
        const content = $("#memo-content").val().trim(); // title, content에 스페이스바만 입력할 수 있어서 공백을 없애줌.

        if(title === "") {    // title, content에 값이 없을 때 값을 요구
          alert("제목을 입력하시오.");
          $("#memo-title").focus();
          return;
        }
        if(content === "") {
          alert("내용을 입력하시오");
          $("#memo-content").focus();
          return;
        }

        $.ajax({
          type: "POST",
          url: "/api/memos",
          data: { title: title, content: content },
          success: function (response) {
            if (response.result === "success") {
              $("#memo-title").val("");  //성공하면 입력 칸을 다시 빈 칸으로 만들기
              $("#memo-content").val("");
              alert("포스팅 성공!");
              loadMemos();
            }
            else alert("포스팅 실패 ㅠㅠ");
          }
        });
      }

      function appendMemoCard(memo) {   // 메모 카드 HTML을 만들어 #card-list에 추가하는 함수
        const cardHtml = `
          <div class="col" data-id="${memo._id}">
            <div class="card h-100">
              <div class="card-body">
                <h5 class="card-title">${memo.title}</h5>
                <p class="card-text">${memo.content}</p>
                <span class="card-likes">${memo.likes}</span> 

                <div class="card-actions">
                  <button class="btn btn-sm btn-info edit-button"
                          onclick="enterEditMode('${memo._id}')">수정</button>

                  <button class="btn btn-sm btn-danger delete-button"
                          onclick="deleteMemo('${memo._id}')">삭제</button>

                  <span class="link-like like-area"
                        onclick="likeMemo('${memo._id}')">좋아요! 👍</span>
                </div>
              </div>
            </div>
          </div>
        `;

        $("#card-list").append(cardHtml);
      }

      function likeMemo(memoId) {   // 좋아요 수 반영 후 목록 다시 로드하는 함수
        $.ajax({
          type: "POST", 
          url: `/api/memos/${memoId}/like`,
          success: function (response) {
            if (response.result === "success") {
              loadMemos();
            }
          },
        });
      }

      function deleteMemo(memoId) {   // 메모 카드 삭제 후 목록 다시 로드하는 함수
        $.ajax({
          type: "DELETE",
          url: `/api/memos/${memoId}`,
          success: function (response) {
            if (response.result === "success") {
              alert("삭제 완료!")
              loadMemos();
            }
          },
        });
      }

      function enterEditMode(memoId) {    // 수정 모드로 전환하는 함수
        const editCard = $(`div[data-id='${memoId}']`);

        // 기존 카드 내용 추출
        const currentTitle = editCard.find(".card-title").text();
        const currentText = editCard.find(".card-text").text();
        const currentLikes = editCard.find(".card-likes").text();

        // 수정 UI로 교체할 HTML
        const editHtml = `
          <div class="col" data-id="${memoId}">
            <div class="card h-100">
              <div class="card-body">
                <input class="form-control mb-2 new-title" value="${currentTitle}" />
                <textarea class="form-control mb-3 new-text" rows="3">${currentText}</textarea>

                <div class="card-actions">
                  <button class="btn btn-sm btn-success save-button"
                          onclick="saveEdit('${memoId}')">저장</button>
                </div>
              </div>
            </div>
          </div>
        `;

        editCard.replaceWith(editHtml);
      }

      function saveEdit(memoId) {   // 저장 버튼을 누르면 호출되고, 변경된 값들을 반영하여 보여주는 함수
        const editCard = $(`div[data-id='${memoId}']`);
        const newTitle = editCard.find(".new-title").val().trim();
        const newText = editCard.find(".new-text").val().trim();

        $.ajax({
          type: "PUT",
          url: `/api/memos/${memoId}`,
          data: { title: newTitle, content: newText },
          success: function (response) {
            if (response.result === "success") {
              alert("수정 완료!");
              loadMemos();
            }
            else if(newTitle === "") alert("제목이 비었어요 ㅠㅠ");
            else if(newText === "") alert("내용이 비었어요 ㅠㅠ");
            else alert("제목, 내용이 없어요 ㅠㅠ");
          }
        });
      }
    </script>
  </body>
</html>
