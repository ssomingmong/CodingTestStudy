<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- 이 부분은 절대 지우지 마세요. -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- 이 부분은 절대 지우지 마세요. -->

    <title>나홀로메모장 ver2.0</title>

    <style>
      /* 화면 스타일은 자유지만, 채점 규약(id/class)은 반드시 지켜야 함 */
      body { background: #f4f6f8; }
      .container { max-width: 920px; }
      .hero { background: #e9ecef; border-radius: 12px; padding: 24px; margin-top: 18px; }
      .memo-form { background: white; border-radius: 12px; padding: 18px; margin-top: 16px; }
      .card-actions { display: flex; gap: 10px; align-items: center; }
      .like-area { cursor: pointer; user-select: none; }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- 헤더 영역 -->
      <div class="hero">
        <h1 class="mb-0">
          나홀로메모장 <span class="badge bg-secondary">ver2.0</span>
        </h1>
      </div>

      <!-- ======================================================
           [메모 입력 폼]
           채점 규약:
           - 제목 input id="memo-title"
           - 내용 textarea id="memo-content"
           - 저장 버튼: type="submit" 포함 + 버튼 텍스트 "저장하기"
           ====================================================== -->
      <div class="memo-form">
        <!-- form으로 묶고 submit 이벤트를 JS에서 가로채서 Ajax로 처리 -->
        <form id="memo-form">
          <div class="mb-3">
            <!-- 규약: id는 memo-title -->
            <input
              id="memo-title"
              class="form-control"
              placeholder="제목을 입력하세요"
            />
          </div>

          <div class="mb-3">
            <!-- 규약: id는 memo-content -->
            <textarea
              id="memo-content"
              class="form-control"
              rows="3"
              placeholder="내용을 입력하세요"
            ></textarea>
          </div>

          <!-- 규약: type="submit" + 텍스트 "저장하기" -->
          <button type="submit" class="btn btn-primary">저장하기</button>
        </form>
      </div>

      <!-- ======================================================
           [카드 리스트 영역]
           채점 규약:
           - 카드들이 모이는 목록의 id는 card-list
           - 실제 카드는 JS가 Ajax로 데이터를 받아와서 동적으로 추가
           ====================================================== -->
      <div id="card-list" class="row row-cols-1 row-cols-md-3 g-4 mt-2"></div>
    </div>

    <!-- 이 부분은 절대 지우지 마세요. -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 이 부분은 절대 지우지 마세요. -->

    <script>
      // ======================================================
      // 페이지가 로드되면 실행되는 부분
      // ======================================================
      $(document).ready(function () {
        // 1) 처음 화면에서 카드 목록을 가져와 렌더링
        loadMemos();

        // 2) form submit(저장하기 클릭/엔터) 이벤트를 가로채서 Ajax로 저장
        $("#memo-form").on("submit", function (e) {
          e.preventDefault(); // 기본 submit(페이지 이동/새로고침) 막기
          createMemo();       // Ajax로 저장
        });
      });

      // ======================================================
      // [GET] 메모 목록을 받아와서 화면에 그리는 함수
      // - 규약: 좋아요를 누른 후에도 "즉시" 내림차순 정렬로 다시 표시해야 함
      // - 가장 안전한 방법: 서버에서 이미 정렬된 데이터를 받거나,
      //   받자마자 프론트에서 정렬한 뒤 렌더링
      // ======================================================
      function loadMemos() {
        $.ajax({
          type: "GET",
          url: "/api/memos",
          success: function (response) {
            if (response.result !== "success") return;

            // 카드 목록 영역 초기화
            $("#card-list").empty();

            // 서버에서 받은 메모 리스트
            const memos = response.memos;

            // 순서대로 카드 생성
            for (let i = 0; i < memos.length; i++) {
              appendMemoCard(memos[i]);
            }
          },
        });
      }

      // ======================================================
      // [POST] 새 메모 저장
      // - 상단 입력칸(id memo-title, memo-content)의 값을 읽어서 서버로 전송
      // ======================================================
      function createMemo() {
        const title = $("#memo-title").val();
        const content = $("#memo-content").val();

        $.ajax({
          type: "POST",
          url: "/api/memos",
          data: { title: title, content: content },
          success: function (response) {
            if (response.result === "success") {
              // 저장 성공 시 입력칸 비우기
              $("#memo-title").val("");
              $("#memo-content").val("");

              // 전체 목록 다시 로드 (카드 재렌더링)
              loadMemos();
            }
          },
          error: function () {
            alert("저장 실패: 제목/내용을 확인하세요.");
          },
        });
      }

      // ======================================================
      // 메모 카드 HTML을 만들어 #card-list에 추가하는 함수
      //
      // 채점 규약(중요):
      // - 제목 표시 element에만 class="card-title" 포함
      // - 내용 표시 element에만 class="card-text" 포함
      // - 좋아요 숫자 표시 element에만 class="card-likes" 포함
      // - 좋아요 클릭 element에만 class="link-like" 포함
      // - 수정 버튼: 텍스트 "수정", class="edit-button" 포함
      // - 삭제 버튼: 텍스트 "삭제", class="delete-button" 포함
      // ======================================================
      function appendMemoCard(memo) {
        const cardHtml = `
          <div class="col" data-id="${memo._id}">
            <div class="card h-100">
              <div class="card-body">
                <h5 class="card-title">${memo.title}</h5>
                <p class="card-text">${memo.content}</p>

                <div class="card-actions">
                  <button class="btn btn-sm btn-info edit-button"
                          onclick="enterEditMode('${memo._id}')">수정</button>

                  <button class="btn btn-sm btn-danger delete-button"
                          onclick="deleteMemo('${memo._id}')">삭제</button>

                  <span class="link-like like-area"
                        onclick="likeMemo('${memo._id}')">좋아요! 👍</span>

                  <span class="card-likes">${memo.likes}</span>
                </div>
              </div>
            </div>
          </div>
        `;

        $("#card-list").append(cardHtml);
      }

      // ======================================================
      // [POST] 좋아요 +1
      // - 좋아요 클릭 즉시 전체 목록을 다시 불러와서
      //   "좋아요 내림차순" 정렬 상태로 표시되게 함
      // ======================================================
      function likeMemo(memoId) {
        $.ajax({
          type: "POST",
          url: `/api/memos/${memoId}/like`,
          success: function (response) {
            if (response.result === "success") {
              // 규약: 즉시 좋아요 기준 내림차순 정렬로 다시 표시
              loadMemos();
            }
          },
        });
      }

      // ======================================================
      // [DELETE] 메모 삭제
      // - 삭제 후 목록 다시 로드
      // ======================================================
      function deleteMemo(memoId) {
        $.ajax({
          type: "DELETE",
          url: `/api/memos/${memoId}`,
          success: function (response) {
            if (response.result === "success") {
              loadMemos();
            }
          },
        });
      }

      // ======================================================
      // 수정 모드로 전환
      // - 현재 카드의 제목/내용을 읽어서 input/textarea로 바꿔치기
      //
      // 채점 규약:
      // - 제목 입력창 class에 new-title 포함
      // - 내용 입력창 class에 new-text 포함
      // - 저장 버튼 텍스트 "저장"
      // - 저장 버튼 class에 save-button 포함
      // - 저장 버튼에는 type="submit" 넣지 말 것
      // ======================================================
      function enterEditMode(memoId) {
        const $col = $(`div[data-id='${memoId}']`);

        // 기존 카드 내용 추출
        const currentTitle = $col.find(".card-title").text();
        const currentText = $col.find(".card-text").text();
        const currentLikes = $col.find(".card-likes").text();

        // 수정 UI로 교체할 HTML
        const editHtml = `
          <div class="col" data-id="${memoId}">
            <div class="card h-100">
              <div class="card-body">
                <input class="form-control mb-2 new-title" value="${currentTitle}" />
                <textarea class="form-control mb-3 new-text" rows="3">${currentText}</textarea>

                <div class="card-actions">
                  <button class="btn btn-sm btn-success save-button"
                          onclick="saveEdit('${memoId}')">저장</button>

                  <span class="link-like like-area"
                        onclick="likeMemo('${memoId}')">좋아요! 👍</span>

                  <span class="card-likes">${currentLikes}</span>
                </div>
              </div>
            </div>
          </div>
        `;

        // 현재 카드를 수정 UI로 교체
        $col.replaceWith(editHtml);
      }

      // ======================================================
      // [PUT] 수정 저장
      // - new-title, new-text 값을 읽어서 서버로 전송
      // - 성공하면 전체 목록 다시 로드
      // ======================================================
      function saveEdit(memoId) {
        const $col = $(`div[data-id='${memoId}']`);
        const newTitle = $col.find(".new-title").val();
        const newText = $col.find(".new-text").val();

        $.ajax({
          type: "PUT",
          url: `/api/memos/${memoId}`,
          data: { title: newTitle, content: newText },
          success: function (response) {
            if (response.result === "success") {
              loadMemos();
            }
          },
          error: function () {
            alert("수정 실패: 제목/내용을 확인하세요.");
          },
        });
      }
    </script>
  </body>
</html>
